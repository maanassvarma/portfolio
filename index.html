<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maanas Varma</title>
  <style>
    :root {
      --bg: #f5f3ef;
      --text: #2a2a2a;
      --muted: #5c5c5c;
      --border: #d4d0c8;
      --link: #3d4a5c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.05rem;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 42rem;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 4rem;
    }

    header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: normal;
      letter-spacing: 0.01em;
      margin-bottom: 0.35rem;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.95rem;
      font-style: italic;
      margin-bottom: 1.25rem;
    }

    .bio p + p {
      margin-top: 1rem;
    }

    h2 {
      font-size: 1.1rem;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .pieces {
      list-style: none;
    }

    .piece {
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--border);
    }

    .piece:first-child {
      padding-top: 0;
    }

    .piece-title {
      font-size: 1.05rem;
      font-weight: normal;
      margin-bottom: 0.35rem;
    }

    .piece-desc {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    a {
      color: var(--link);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    a:hover {
      border-bottom-color: var(--link);
    }

    .piece-link {
      font-size: 0.9rem;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    footer {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="name"></h1>
      <p class="tagline" id="tagline"></p>
      <div class="bio" id="bio"></div>
    </header>

    <section aria-labelledby="section-title">
      <h2 id="section-title">Writing &amp; Research</h2>
      <ul class="pieces" id="pieces"></ul>
    </section>

    <footer id="footer"></footer>
  </main>

  <script>
    // ——— Edit everything below ———

    const name = "Maanas Varma";
    const tagline = "Independent Researcher · Dallas, TX";
    const bio = [
      "I'm a Data Science undergraduate at UT Dallas interested in the technical foundations of strategic competition. My research focuses on whether China's semiconductor and AI capabilities match official claims, and what current U.S. export controls are and are not doing about it.",
      "I also write analytical pieces on technology competition, industrial policy, and supply chain concentration for the Michigan Journal of Economics. I'm admitted to UT Dallas's M.S. program in Artificial Intelligence beginning Fall 2026. Reach me at maanassvarma@gmail.com.",
    ];
    const email = "maanassvarma@gmail.com";

    const pieces = [
      {
        title: "China AI Compute Capacity Study",
        description: "An assessment of whether China's domestic AI chip production can realistically support frontier AI development, and what current U.S. export controls are and are not achieving.",
        pdf: "papers/china-ai-compute-capacity.pdf",
      },
      {
        title: "The Packaging Ceiling",
        description: "Analyzes whether China's advanced packaging capabilities can substitute for restricted front-end chip manufacturing, assessing chiplet-based architectures as a potential workaround to U.S. export controls.",
        pdf: "papers/packaging-ceiling.pdf",
      },
      {
        title: "The Silicon Chokepoint: Taiwan and TSMC",
        description: "Examines Taiwan's structural role as the world's dominant source of advanced chip manufacturing and what that concentration means for U.S. technology strategy.",
        pdf: "papers/silicon-chokepoint-taiwan-tsmc.pdf",
      },
      {
        title: "The Price of Control: Export Restrictions",
        description: "Analyzes the economics of semiconductor export restrictions, tracing who bears the costs of controls designed to limit China's access to advanced chip technology.",
        pdf: "papers/price-of-control-export-restrictions.pdf",
      },
      {
        title: "The Economics of Semiconductor Yield",
        description: "Explains how yield curves shape competitive dynamics in chip manufacturing, and why the economics of yield make semiconductor production unusually resistant to new entrants.",
        pdf: "papers/economics-of-semiconductor-yield.pdf",
      },
      {
        title: "From Prediction to Production: AI and Materials Discovery",
        description: "Evaluates whether AI-assisted literature synthesis can reliably accelerate materials discovery, and where automated research pipelines currently fall short.",
        pdf: "papers/ai-materials-discovery.pdf",
      },
    ];

    // ——— No need to edit below ———

    document.getElementById("name").textContent = name;
    document.getElementById("tagline").textContent = tagline;
    document.getElementById("bio").innerHTML = bio.map((p) => `<p>${p}</p>`).join("");
    document.getElementById("footer").innerHTML = `<a href="mailto:${email}">${email}</a>`;

    const list = document.getElementById("pieces");
    pieces.forEach((piece) => {
      const li = document.createElement("li");
      li.className = "piece";
      li.innerHTML = `
        <h3 class="piece-title">${piece.title}</h3>
        <p class="piece-desc">${piece.description}</p>
        <a class="piece-link" href="${piece.pdf}">PDF</a>
      `;
      list.appendChild(li);
    });
  </script>
</body>
</html>
